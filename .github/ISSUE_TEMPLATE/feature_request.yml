name: Feature request
description: Propose a scoped installer improvement or new capability.
title: "[Feature]: "
labels:
  - type:feature
  - status:needs-review
body:
  - type: markdown
    attributes:
      value: |
        Use this form for new installer capabilities or meaningful improvements to existing behavior.
        Small, concrete requests that explain the problem and scope are easiest to evaluate and automate.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I am describing a concrete problem or use case, not just a vague idea.
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the installer would this change affect?
      options:
        - macOS packaging or notarization
        - Windows packaging
        - TritonAI Harness desktop install
        - Codex managed runtime
        - UCSD/TritonAI configuration
        - Bundled skills
        - Clean install or migration
        - Docs
        - Not sure
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do? What is hard, slow, or impossible today?
      placeholder: I want the installer to detect stale Codex runtime state and explain what it changed.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, API, or UX you want.
      placeholder: Add a diagnostics step that lists stale runtime paths before cleanup.
    validations:
      required: true

  - type: textarea
    id: value
    attributes:
      label: Why this matters
      description: Who benefits, and what outcome does this unlock?
      placeholder: It would make support easier when users have old local agent configs.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Smallest useful scope
      description: What is the narrowest version of this request that would still solve your problem?
      placeholder: A first pass can log stale paths without adding new UI.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds, prior art, or other approaches you considered.

  - type: textarea
    id: tradeoffs
    attributes:
      label: Risks or tradeoffs
      description: What costs, complexity, or edge cases should be considered?

  - type: textarea
    id: references
    attributes:
      label: Examples or references
      description: Links, screenshots, mockups, or comparable tools.
